<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>MazeTD V22.0 - PixiJS Test</title><style>body{background:#0a0a1f;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif}h1{color:#00E5FF;margin-bottom:20px}#game-container{width:360px;height:480px;border:2px solid #333;border-radius:12px;overflow:hidden}#status{color:#888;margin-top:15px}</style></head><body><h1>MazeTD V22.0</h1><div id="game-container"></div><div id="status">Loading...</div><script type="module">import * as PIXI from "pixi.js";const app=new PIXI.Application();await app.init({width:360,height:480,backgroundColor:0x0a0a1f,antialias:true});document.getElementById("game-container").appendChild(app.canvas);const g=new PIXI.Graphics();const CS=40,COLS=8,ROWS=12,ox=(360-COLS*CS)/2,oy=(480-ROWS*CS)/2;g.rect(ox,oy,COLS*CS,ROWS*CS);g.fill(0x1a1a3a);for(let y=0;y<=ROWS;y++){g.moveTo(ox,oy+y*CS);g.lineTo(ox+COLS*CS,oy+y*CS);g.stroke({width:1,color:0x3a3a5a})}for(let x=0;x<=COLS;x++){g.moveTo(ox+x*CS,oy);g.lineTo(ox+x*CS,oy+ROWS*CS);g.stroke({width:1,color:0x3a3a5a})}g.rect(ox+CS+4,oy+4,CS-8,CS-8);g.fill(0x00E676);g.rect(ox+(COLS-2)*CS+4,oy+(ROWS-1)*CS+4,CS-8,CS-8);g.fill(0xFF1744);app.stage.addChild(g);const tower=new PIXI.Graphics();tower.circle(ox+3*CS+20,oy+3*CS+20,15);tower.fill(0x4CAF50);app.stage.addChild(tower);const enemy=new PIXI.Graphics();enemy.circle(0,0,12);enemy.fill(0x8BC34A);enemy.x=ox+1.5*CS;enemy.y=oy+0.5*CS;app.stage.addChild(enemy);let t=0;app.ticker.add(()=>{t+=0.02;enemy.y=oy+(0.5+Math.sin(t)*0.3)*CS});document.getElementById("status").textContent="PixiJS V22.0 ready!";document.getElementById("status").style.color="#00E676";</script></body></html>
