<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d1f">
<title>迷宫塔防 V20.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:#0a0a1f;font-family:'PingFang SC','Helvetica Neue',Helvetica,Arial,'Microsoft YaHei',sans-serif}
:root{--gold:#FFD700;--green:#00E676;--red:#FF1744;--cyan:#00E5FF;--purple:#E040FB;--glass:rgba(15,15,40,0.92);--border:rgba(255,255,255,0.12)}
#game{width:100%;height:100dvh;display:none;flex-direction:column;background:linear-gradient(180deg,#0d0d2b 0%,#080818 100%);position:relative;overflow:hidden}
#top{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:8px 10px;padding-top:calc(8px + env(safe-area-inset-top,0px));background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,215,0,0.2);z-index:50}
.stat{display:flex;align-items:center;gap:4px;color:#8a8aaa;font-size:11px;background:rgba(50,50,90,0.6);padding:5px 10px;border-radius:10px}
.stat b{color:var(--gold);font-size:15px;font-weight:800;text-shadow:0 0 10px rgba(255,215,0,0.6)}
.stat.red b{color:var(--red)} .stat.green b{color:var(--green)} .stat.purple b{color:var(--purple)}
#canvas-box{flex:1;min-height:0;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%}
#entry-mark,#exit-mark{position:absolute;left:50%;transform:translateX(-50%);padding:3px 12px;border-radius:15px;font-size:9px;font-weight:700;z-index:15;pointer-events:none}
#entry-mark{top:10px;background:linear-gradient(135deg,#00C853,#00E676);color:#fff}
#exit-mark{bottom:10px;background:linear-gradient(135deg,#D50000,#FF1744);color:#fff}
#tip{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.88);color:#fff;padding:10px 24px;border-radius:12px;font-size:14px;z-index:30;pointer-events:none;display:none;white-space:nowrap;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.15)}
@keyframes fadeInOut{0%{opacity:0;transform:translate(-50%,-50%) scale(0.85)}15%{opacity:1;transform:translate(-50%,-50%) scale(1)}70%{opacity:1}100%{opacity:0}}
#tip.show{animation:fadeInOut 1.5s ease forwards}
#wave-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:24px;font-weight:900;color:#fff;z-index:35;pointer-events:none;display:none;text-align:center;text-shadow:0 0 24px rgba(255,255,255,0.6);animation:waveIn .45s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes waveIn{0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
#info,#ai-info{position:absolute;left:8px;background:var(--glass);padding:8px 10px;border-radius:12px;font-size:11px;color:#7a7a9a;z-index:20;backdrop-filter:blur(10px);border:1px solid var(--border);min-width:95px}
#info{top:50px} #ai-info{bottom:160px} #info h4,#ai-info h4{color:var(--cyan);font-size:11px;margin-bottom:4px} #info p,#ai-info p{margin:2px 0} #info b,#ai-info b{color:var(--gold)}
.good{color:var(--green)!important} .bad{color:var(--red)!important}
#bottom{flex-shrink:0;background:var(--glass);backdrop-filter:blur(20px);padding:6px;padding-bottom:calc(6px + env(safe-area-inset-bottom,0px));border-top:1px solid rgba(255,215,0,0.2)}
#tower-panel{display:flex;justify-content:center;gap:5px;margin-bottom:5px;overflow-x:auto;padding:1px;scrollbar-width:none}
#tower-panel::-webkit-scrollbar{display:none}
.tower-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:50px;height:60px;flex-shrink:0;background:linear-gradient(160deg,rgba(50,50,95,.95),rgba(30,30,70,.95));border:1.5px solid rgba(255,255,255,.1);border-radius:14px;cursor:pointer;position:relative;transition:all .15s}
.tower-btn.selected{border-color:var(--gold);background:linear-gradient(160deg,rgba(80,75,40,.98),rgba(55,50,25,.98));box-shadow:0 0 18px rgba(255,215,0,.4);transform:translateY(-3px)}
.tower-btn.disabled{opacity:.35;pointer-events:none}
.tower-btn:active{transform:scale(.92)}
.tower-btn .icon{font-size:20px} .tower-btn .price{position:absolute;bottom:3px;background:linear-gradient(135deg,#B8860B,#FFD700);color:#1a1200;font-size:9px;font-weight:800;padding:1px 5px;border-radius:6px}
.tower-btn .name{font-size:9px;color:#6a6a8a}
#toolbar{display:flex;justify-content:center;gap:7px;margin-bottom:5px}
.tool-btn{display:flex;align-items:center;gap:4px;padding:6px 12px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:18px;color:#9a9aba;font-size:12px;cursor:pointer;transition:all .15s}
.tool-btn.selected{border-color:var(--cyan);background:rgba(0,229,255,.12);color:#fff}
#actions{display:flex;justify-content:center;gap:7px}
.act-btn{flex:1;max-width:100px;padding:9px 6px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s}
#btn-fight{background:linear-gradient(135deg,#FF1744,#D50000);color:#fff;box-shadow:0 4px 14px rgba(255,23,68,.5);font-size:14px}
#btn-undo{background:linear-gradient(135deg,#FF9100,#FF6D00);color:#fff} #btn-clear{background:linear-gradient(135deg,#455a64,#263238);color:#bbb}
#menu{position:absolute;inset:0;background:radial-gradient(ellipse at 35% 20%,#1e1e5a 0%,#0f0f35 40%,#060618 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:20px}
#menu h1{color:var(--cyan);font-size:30px;margin-bottom:6px;font-weight:900;text-shadow:0 0 28px rgba(0,229,255,.8);letter-spacing:5px}
#menu h2{color:#6a6a9a;font-size:13px;margin-bottom:24px;letter-spacing:3px}
.menu-btn{width:200px;padding:14px;margin:7px 0;background:linear-gradient(145deg,rgba(55,55,110,.95),rgba(35,35,80,.95));border:1.5px solid rgba(255,215,0,.3);color:#fff;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer;transition:all .18s;box-shadow:0 6px 20px rgba(0,0,0,.5)}
.menu-btn:active{border-color:var(--gold);box-shadow:0 0 32px rgba(255,215,0,.4);transform:translateY(-2px)}
.guide{margin-top:20px;padding:14px;background:rgba(0,0,0,.5);border-radius:14px;max-width:300px;text-align:left;border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(10px)}
.guide h3{color:var(--cyan);font-size:13px;margin-bottom:8px} .guide p{color:#9a9aba;font-size:12px;margin:5px 0;line-height:1.6} .guide b{color:var(--gold)}
#over,#level-complete{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(18,18,42,.97) 0%,rgba(4,4,10,.99) 100%);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:90;padding:24px;backdrop-filter:blur(24px)}
#over h1{font-size:38px;color:var(--red);margin-bottom:18px;text-shadow:0 0 36px rgba(255,23,68,.7);font-weight:900}
#level-complete h1{font-size:34px;color:var(--green);margin-bottom:16px;text-shadow:0 0 36px rgba(0,230,118,.7);font-weight:900}
#over p,#level-complete p{color:#9a9aba;font-size:14px;margin:7px 0} #over b,#level-complete b{color:var(--gold);font-size:18px}
#stars{font-size:28px;letter-spacing:5px;text-shadow:0 0 18px rgba(255,215,0,.6)}
#upgrade-panel{position:absolute;display:none;z-index:60;background:var(--glass);border:2px solid var(--gold);border-radius:14px;padding:10px;min-width:150px;box-shadow:0 8px 28px rgba(0,0,0,.6)}
#upgrade-panel .up-info{color:#9a9aba;font-size:11px;margin-bottom:5px;text-align:center}
#upgrade-panel .up-btn{width:100%;padding:7px;margin-top:5px;border:none;border-radius:10px;background:linear-gradient(135deg,#B8860B,#FFD700);color:#1a1200;font-weight:800;font-size:12px;cursor:pointer}
#upgrade-panel .up-btn:disabled{opacity:.35;cursor:not-allowed}
#upgrade-panel .close-btn{position:absolute;top:3px;right:7px;background:none;border:none;color:#555;font-size:17px;cursor:pointer}
@keyframes touchRipple{0%{transform:scale(.5);opacity:1}100%{transform:scale(2.5);opacity:0}}
.touch-feedback{position:absolute;border-radius:50%;background:rgba(255,215,0,.4);pointer-events:none;animation:touchRipple .5s ease-out forwards}
@media(max-width:380px){.tower-btn{min-width:46px;height:54px}.act-btn{max-width:85px}}
</style>
</head>
<body>
<div id="menu">
  <h1>🏰 迷宫塔防</h1>
  <h2>腾讯小游戏 · 精品品质</h2>
  <button class="menu-btn" onclick="startGame()">▶ 开始游戏</button>
  <div class="guide"><h3>🎮 游戏指南</h3>
    <p><b>目标</b> - 建造墙壁引导敌人，用塔消灭它们</p>
    <p><b>建造</b> - 选择塔种，点击画布放置</p>
    <p><b>删除</b> - 点击删除工具，再点击已放置的塔</p>
    <p><b>开战</b> - 部署完成后点击开战按钮</p>
  </div>
</div>
<div id="game">
  <div id="top">
    <span class="stat">💰<b id="show-gold">400</b></span>
    <span class="stat purple">🌊<b id="show-wave">0</b></span>
    <span class="stat red">❤️<b id="show-hp">20</b></span>
    <span class="stat green">🏆<b id="show-level">1-1</b></span>
  </div>
  <div id="canvas-box">
    <div id="upgrade-panel"><button class="close-btn" onclick="closeUpgradePanel()">×</button>
      <div class="up-info" id="up-info">选择一座塔</div>
      <button class="up-btn" id="up-btn" onclick="doUpgradeFromPanel()">升级 (0 金)</button>
    </div>
    <canvas id="cv"></canvas>
    <div id="entry-mark">🟢 入口</div>
    <div id="exit-mark">🔴 出口</div>
    <div id="tip"></div>
    <div id="wave-msg"></div>
    <div id="info"><h4>📊 路径</h4><p>长度: <b id="show-length">-</b></p><p>弯数: <b id="show-turns">-</b></p><p>效率: <b id="show-efficiency">-</b></p></div>
    <div id="ai-info"><h4>🧠 AI情报</h4><p>侦察: <b id="show-scouts">0</b></p><p>破坏者: <b id="show-destroyers">0</b></p><p>记忆点: <b id="show-memory">0</b></p></div>
  </div>
  <div id="bottom">
    <div id="tower-panel">
      <div class="tower-btn selected" data-type="archer" onclick="pickTower('archer')"><canvas class="icon-cv" data-tower="archer" width="24" height="24"></canvas><span class="price">60</span><span class="name">弓箭</span></div>
      <div class="tower-btn" data-type="ice" onclick="pickTower('ice')"><canvas class="icon-cv" data-tower="ice" width="24" height="24"></canvas><span class="price">65</span><span class="name">冰冻</span></div>
      <div class="tower-btn" data-type="cannon" onclick="pickTower('cannon')"><canvas class="icon-cv" data-tower="cannon" width="24" height="24"></canvas><span class="price">100</span><span class="name">炮塔</span></div>
      <div class="tower-btn" data-type="poison" onclick="pickTower('poison')"><canvas class="icon-cv" data-tower="poison" width="24" height="24"></canvas><span class="price">80</span><span class="name">毒塔</span></div>
      <div class="tower-btn" data-type="thunder" onclick="pickTower('thunder')"><canvas class="icon-cv" data-tower="thunder" width="24" height="24"></canvas><span class="price">110</span><span class="name">雷电</span></div>
      <div class="tower-btn" data-type="wall" onclick="pickTower('wall')"><canvas class="icon-cv" data-tower="wall" width="24" height="24"></canvas><span class="price">20</span><span class="name">墙壁</span></div>
    </div>
    <div id="toolbar">
      <div class="tool-btn selected" id="tool-place" onclick="setTool('place')"><span>📍</span><span>放置</span></div>
      <div class="tool-btn" id="tool-delete" onclick="setTool('delete')"><span>🗑️</span><span>删除</span></div>
    </div>
    <div id="actions">
      <button class="act-btn" id="btn-fight" onclick="toggleBattle()">⚔️ 开战</button>
      <button class="act-btn" id="btn-undo" onclick="undoLast()">↩️ 撤销</button>
      <button class="act-btn" id="btn-clear" onclick="clearAll()">🗑️ 清空</button>
    </div>
  </div>
</div>
<div id="over"><h1>💀 游戏结束</h1><p>波次: <b id="final-wave">0</b></p><p>击杀: <b id="final-kills">0</b></p><button class="menu-btn" onclick="startGame()" style="margin-top:20px">🔄 再来一局</button></div>
<div id="level-complete"><h1>🎉 关卡完成！</h1><p>星级: <b id="stars">⭐⭐⭐</b></p><p>奖励: <b id="bonus-gold">0</b>金</p><button class="menu-btn" onclick="nextLevel()" style="margin-top:16px">➡️ 下一关</button></div>
<script>
const CS=40,COLS=8,ROWS=12,ENTRY={x:1,y:0},EXIT={x:COLS-2,y:ROWS-1},FPS=60;
const ELEMENT_BONUS={normal:{weakTo:[],bonus:1},fire:{weakTo:['ice','poison'],bonus:1.5},ice:{weakTo:['fire','thunder'],bonus:1.5},poison:{weakTo:['ice','archer'],bonus:1.5},thunder:{weakTo:['poison'],bonus:1.8}};
const T={archer:{c:'#4CAF50',element:'archer',d:20,r:4,s:1000,$:45,dps:20},ice:{c:'#03A9F4',element:'ice',d:12,r:3.5,s:1200,$:50,dps:10,slow:.4,slowDur:150},cannon:{c:'#F44336',element:'fire',d:35,r:2.8,s:1400,$:80,dps:25,a:1.5},poison:{c:'#8BC34A',element:'poison',d:8,r:3,s:800,$:60,dps:10,dot:15,dotStacks:5,dotDur:200},thunder:{c:'#9C27B0',element:'thunder',d:24,r:4,s:1200,$:90,dps:20,chain:3},wall:{c:'#78909C',d:0,r:0,s:0,$:15,hp:500,maxHp:500,isWall:true}};
const N={archer:'弓箭塔',ice:'冰冻塔',cannon:'炮塔',poison:'毒塔',thunder:'雷电塔',wall:'墙壁'};
const LEVELS=[{id:'1-1',name:'初阵',chapter:'tutorial',waves:3,startGold:650,goldBonus:40,unlock:['wall','archer'],enemies:['normal'],starThresholds:[.95,.85,.7]},{id:'1-2',name:'疾风',chapter:'tutorial',waves:3,startGold:620,goldBonus:50,unlock:['wall','archer','ice'],enemies:['normal','fast']},{id:'1-3',name:'铁壁',chapter:'tutorial',waves:4,startGold:600,goldBonus:55,unlock:['wall','archer','ice','cannon'],enemies:['normal','fast']},{id:'1-4',name:'毒雾',chapter:'tutorial',waves:4,startGold:580,goldBonus:65,unlock:['all'],enemies:['normal','fast','tank']},{id:'1-5',name:'雷霆',chapter:'tutorial',waves:5,startGold:550,goldBonus:80,unlock:['all'],enemies:['normal','fast','tank'],boss:true},{id:'2-1',name:'暗流',chapter:'basics',waves:5,startGold:530,goldBonus:90,unlock:['all'],enemies:['normal','fast','scout']},{id:'2-2',name:'破壁',chapter:'basics',waves:6,startGold:510,goldBonus:100,unlock:['all'],enemies:['normal','fast','destroyer']},{id:'2-3',name:'幻形',chapter:'basics',waves:6,startGold:500,goldBonus:110,unlock:['all'],enemies:['normal','fast','shifter']},{id:'2-4',name:'混战',chapter:'basics',waves:7,startGold:490,goldBonus:120,unlock:['all'],enemies:['normal','fast','tank','scout']},{id:'2-5',name:'狂潮',chapter:'basics',waves:8,startGold:470,goldBonus:140,unlock:['all'],enemies:['all'],boss:true},{id:'3-1',name:'冰火',chapter:'advanced',waves:6,startGold:450,goldBonus:150,unlock:['all'],enemies:['fast','tank','destroyer']},{id:'3-2',name:'毒雷',chapter:'advanced',waves:7,startGold:440,goldBonus:160,unlock:['all'],enemies:['tank','scout','shifter']},{id:'3-3',name:'连锁',chapter:'advanced',waves:7,startGold:430,goldBonus:170,unlock:['all'],enemies:['normal','fast','scout','destroyer']},{id:'3-4',name:'逆克',chapter:'advanced',waves:8,startGold:420,goldBonus:180,unlock:['all'],enemies:['all']},{id:'3-5',name:'元素',chapter:'advanced',waves:9,startGold:400,goldBonus:200,unlock:['all'],enemies:['all'],boss:true},{id:'4-1',name:'记忆',chapter:'challenge',waves:8,startGold:380,goldBonus:210,unlock:['all'],enemies:['normal','fast','scout','destroyer']},{id:'4-2',name:'适应',chapter:'challenge',waves:9,startGold:370,goldBonus:220,unlock:['all'],enemies:['all']},{id:'4-3',name:'进化',chapter:'challenge',waves:10,startGold:360,goldBonus:230,unlock:['all'],enemies:['all']},{id:'4-4',name:'绝境',chapter:'challenge',waves:11,startGold:350,goldBonus:245,unlock:['all'],enemies:['all']},{id:'4-5',name:'终焉',chapter:'challenge',waves:12,startGold:340,goldBonus:260,unlock:['all'],enemies:['all'],boss:true},{id:'5-1',name:'噩梦',chapter:'elite',waves:10,startGold:320,goldBonus:270,unlock:['all'],enemies:['all']},{id:'5-2',name:'地狱',chapter:'elite',waves:11,startGold:310,goldBonus:285,unlock:['all'],enemies:['all']},{id:'5-3',name:'深渊',chapter:'elite',waves:12,startGold:305,goldBonus:300,unlock:['all'],enemies:['all']},{id:'5-4',name:'炼狱',chapter:'elite',waves:13,startGold:300,goldBonus:320,unlock:['all'],enemies:['all']},{id:'5-5',name:'封神',chapter:'elite',waves:15,startGold:300,goldBonus:350,unlock:['all'],enemies:['all'],boss:true}];
const CHAPTERS={tutorial:{name:'入门篇',color:'#4CAF50'},basics:{name:'基础篇',color:'#2196F3'},advanced:{name:'进阶篇',color:'#9C27B0'},challenge:{name:'挑战篇',color:'#FF5722'},elite:{name:'精英篇',color:'#FFD700'}};
const ENEMY_TYPES={normal:{hp:55,color:'#8BC34A',size:.4,gold:8,speed:.35,element:'normal'},fast:{hp:35,color:'#42A5F5',size:.32,gold:10,speed:.55,element:'ice'},tank:{hp:180,color:'#78909C',size:.52,gold:22,speed:.18,element:'poison'},destroyer:{hp:220,color:'#D32F2F',size:.48,gold:28,speed:.15,element:'fire',isDestroyer:true,atkDmg:80,atkSpeed:1500},scout:{hp:65,color:'#FFD700',size:.36,gold:14,speed:.35,element:'thunder',isScout:true},shifter:{hp:120,color:'#9C27B0',size:.42,gold:20,speed:.28,element:'normal',isShifter:true}};
let cv,ctx,W,H,ox,oy,grid,path,towers=[],enemies=[],bullets=[],parts=[],dmgTexts=[],hist=[];
let gold,hp,wave,kills,cur='archer',tool='place',fighting=false,inited=false,currentLevel=null,curLevelIdx=0,tutorialStep=0,tutorialShown=false,waveScheduled=false;
let aiMemory={dangerZones:[],scoutSurvived:0,destroyerAttacks:0};
let dpr=1,shakeIntensity=0,shakeDuration=0,shakeStart=0;
let animations={list:[]};
let starfieldCanvas,starfieldCtx,starfieldStars=[];
function saveProgress(){try{localStorage.setItem('mazeTD_v20',JSON.stringify({curLevelIdx,highScores:getHighScores()}));}catch(e){}}
function loadProgress(){try{return JSON.parse(localStorage.getItem('mazeTD_v20'));}catch(e){return null;}}
function getHighScores(){try{return JSON.parse(localStorage.getItem('mazeTD_scores'))||{};}catch(e){return{};}}
function saveScore(levelId,stars){const scores=getHighScores();if(!scores[levelId]||scores[levelId]<stars){scores[levelId]=stars;try{localStorage.setItem('mazeTD_scores',JSON.stringify(scores));}catch(e){}}}
function initCanvas(){cv=document.getElementById('cv');if(!cv)return false;ctx=cv.getContext('2d');dpr=window.devicePixelRatio||1;resize();cv.onclick=click;cv.ontouchend=touch;window.onresize=resize;initStarfield();inited=true;return true}
function initStarfield(){starfieldCanvas=document.createElement('canvas');starfieldCtx=starfieldCanvas.getContext('2d');starfieldStars=[];for(let i=0;i<80;i++)starfieldStars.push({x:Math.random()*800,y:Math.random()*600,r:Math.random()*1.5+.5,alpha:Math.random()*.5+.3,twinkle:Math.random()*Math.PI*2});}
function resize(){const b=document.getElementById('canvas-box');if(!b)return;W=b.clientWidth;H=b.clientHeight;if(W>0&&H>0&&cv){cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';ctx.scale(dpr,dpr);ox=Math.floor((W-COLS*CS)/2);oy=Math.floor((H-ROWS*CS)/2);if(starfieldCanvas){starfieldCanvas.width=W*dpr;starfieldCanvas.height=H*dpr;}}}
function initGrid(){grid=[];for(let y=0;y<ROWS;y++){grid[y]=[];for(let x=0;x<COLS;x++)grid[y][x]=(x===0||x===COLS-1||y===0||y===ROWS-1)?1:0;}grid[ENTRY.y][ENTRY.x]=0;grid[EXIT.y][EXIT.x]=0;towers=[];enemies=[];bullets=[];parts=[];dmgTexts=[];hist=[];aiMemory={dangerZones:[],scoutSurvived:0,destroyerAttacks:0};path=findPath();updateInfo();updateTool();}
function findPath(){const d=[[0,1],[1,0],[0,-1],[-1,0]];const pq=[{x:ENTRY.x,y:ENTRY.y,path:[[ENTRY.x,ENTRY.y]],cost:0}];const visited={};visited[ENTRY.x+','+ENTRY.y]=0;while(pq.length>0){pq.sort((a,b)=>a.cost-b.cost);const cur=pq.shift();if(cur.x===EXIT.x&&cur.y===EXIT.y)return cur.path;for(const [dx,dy]of d){const nx=cur.x+dx,ny=cur.y+dy;if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;const blocked=grid[ny][nx]!==0;const cost=cur.cost+(blocked?5:1);const key=nx+','+ny;if(visited[key]!==undefined&&visited[key]<=cost)continue;visited[key]=cost;pq.push({x:nx,y:ny,path:cur.path.concat([[nx,ny]]),cost});}}return null;}
function getEnemyHP(baseHP,wave){return Math.floor(baseHP*(1+wave*.08));}
function getEnemyGold(baseGold,wave){return Math.floor(baseGold*(1.3+wave*.15));}
function updateInfo(){const l=document.getElementById('show-length');const t=document.getElementById('show-turns');const e=document.getElementById('show-efficiency');if(!l)return;l.textContent=path?path.length:'断';t.textContent=turns(path);if(!path){e.textContent='阻断!';e.className='bad';return;}const m=Math.abs(EXIT.x-ENTRY.x)+Math.abs(EXIT.y-ENTRY.y);const r=path.length/m;const b=1+turns(path)*.18;const s=Math.floor(r*b*100);e.textContent=s>=150?'良好':s>=120?'可优化':'极短';e.className=s>=120?'good':'bad';}
function turns(p){if(!p||p.length<3)return 0;let t=0;for(let i=1;i<p.length-1;i++)if(p[i][0]-p[i-1][0]!==p[i+1][0]-p[i][0]||p[i][1]-p[i-1][1]!==p[i+1][1]-p[i][1])t++;return t;}
function updateTool(){const t=T[cur];document.getElementById('tool-name').textContent=N[cur];document.getElementById('tool-cost').textContent=t.$+'金';document.querySelectorAll('.tower-btn').forEach(b=>{const c=parseInt(b.querySelector('.price').textContent);b.classList.toggle('disabled',gold<c);});if(currentLevel&&currentLevel.unlock){document.querySelectorAll('.tower-btn').forEach(b=>{const tp=b.dataset.type;if(currentLevel.unlock[0]!=='all'&&!currentLevel.unlock.includes(tp)){b.classList.add('disabled');b.style.opacity='.3';}else{b.style.opacity='';}});}}
function updateAIInfo(){document.getElementById('show-scouts').textContent=aiMemory.scoutSurvived;document.getElementById('show-destroyers').textContent=aiMemory.destroyerAttacks;document.getElementById('show-memory').textContent=aiMemory.dangerZones.length;}
function updateUI(){document.getElementById('show-gold').textContent=gold;document.getElementById('show-wave').textContent=wave;document.getElementById('show-hp').textContent=hp;document.getElementById('show-level').textContent=currentLevel?currentLevel.id:'1-1';}
function showTip(m){const t=document.getElementById('tip');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600);}
function showTouchFeedback(x,y){const fb=document.createElement('div');fb.className='touch-feedback';fb.style.cssText=`left:${x}px;top:${y}px;width:50px;height:50px;margin:-25px 0 0 -25px;`;document.getElementById('canvas-box')?.appendChild(fb);setTimeout(()=>fb.remove(),500);}
function click(e){if(fighting)return;const r=cv.getBoundingClientRect();act(e.clientX-r.left,e.clientY-r.top);}
function touch(e){if(fighting)return;e.preventDefault();const t=e.changedTouches[0];const r=cv.getBoundingClientRect();const tx=t.clientX-r.left,ty=t.clientY-r.top;showTouchFeedback(tx,ty);act(tx,ty);}
function act(mx,my){if(!tutorialShown)showTutorial();const x=Math.floor((mx-ox)/CS);const y=Math.floor((my-oy)/CS);if(x<=0||x>=COLS-1||y<=0||y>=ROWS-1){showTip('⚠️ 点击网格内部!');return;}if((x===ENTRY.x&&y===ENTRY.y)||(x===EXIT.x&&y===EXIT.y)){showTip('⚠️ 禁止放置!');return;}tool==='place'?place(x,y):del(x,y);}
function place(x,y){const t=T[cur];if(grid[y][x]===2){showTip('⚠️ 已有塔!');return;}if(grid[y][x]===1){showTip('⚠️ 已有墙壁!');return;}if(gold<t.$){showTip('⚠️ 金币不足!');return;}hist.push({a:'p',x,y,tp:cur});grid[y][x]=cur==='wall'?1:2;gold-=t.$;if(cur==='wall'){towers.push({x,y,tp:cur,hp:t.hp,maxHp:t.maxHp});}else{towers.push({x,y,tp:cur,lv:1,i:t.i,co:t.c,d:t.d,r:t.r,s:t.s,cd:0,a:t.a||0});}const np=findPath();if(np&&np.length>0){path=np;spawnP(ox+(x+.5)*CS,oy+(y+.5)*CS,t.c,15);showTip('✓ '+N[cur]+' 放置成功');addAnimation('place',ox+(x+.5)*CS,oy+(y+.5)*CS);}else{grid[y][x]=0;gold+=t.$;if(cur!=='wall')towers.pop();hist.pop();showTip('⚠️ 完全阻断路径!');path=findPath();}updateUI();updateInfo();updateTool();render();}
function del(x,y){if(grid[y][x]===0){showTip('⚠️ 没有物体!');return;}const isWall=grid[y][x]===1;grid[y][x]=0;if(isWall){gold+=Math.floor(T.wall.$*.7);showTip('✓ 墙壁删除');}else{for(let i=0;i<towers.length;i++)if(towers[i].x===x&&towers[i].y===y){gold+=Math.floor(T[towers[i].tp].$*.7);towers.splice(i,1);break;}showTip('✓ 塔删除');}path=findPath();updateUI();updateInfo();updateTool();render();}
function undoLast(){if(!hist.length){showTip('没有可撤销');return;}const h=hist.pop();if(h.a==='p'){grid[h.y][h.x]=0;gold+=T[h.tp].$;if(h.tp!=='wall')for(let i=0;i<towers.length;i++)if(towers[i].x===h.x&&towers[i].y===h.y){towers.splice(i,1);break;}}path=findPath();showTip('✓ 已撤销');updateUI();updateInfo();updateTool();render();}
function clearAll(){initGrid();gold=currentLevel?currentLevel.startGold:400;showTip('✓ 已清空');updateUI();render();}
function pickTower(towerType){cur=towerType;tool='place';document.querySelectorAll('.tower-btn').forEach(b=>b.classList.toggle('selected',b.dataset.type===towerType));document.querySelectorAll('.tool-btn').forEach(b=>b.classList.toggle('selected',b.id==='tool-place'));updateTool();gold<T[towerType].$?showTip('⚠️ 金币不足!'):showTip('✓ '+N[towerType]);}
function setTool(x){tool=x;document.querySelectorAll('.tool-btn').forEach(b=>b.classList.toggle('selected',b.id==='tool-'+x));showTip(x==='delete'?'🗑️ 点击删除':'📍 放置 '+N[cur]);}
const TUTORIALS={'1-1':[{text:'👆 点击网格放置墙壁'},{text:'🏹 选择弓箭塔攻击'},{text:'⚔️ 点击开战!'}],'1-2':[{text:'🌊 快速敌人出现!'},{text:'❄️ 用冰塔减速!'},{text:'⚔️ 点击开战!'}],'1-3':[{text:'💥 炮塔AOE清理!'},{text:'❄️ 冰冻配合!'},{text:'⚔️ 开战!'}]};
function showTutorial(){if(tutorialShown||!currentLevel)return;const steps=TUTORIALS[currentLevel.id];if(!steps||tutorialStep>=steps.length){tutorialShown=true;return;}showTip(steps[tutorialStep].text);tutorialStep++;if(tutorialStep>=steps.length)tutorialShown=true;}
function toggleBattle(){if(!fighting){if(!path){showTip('⚠️ 请先建造迷宫!');return;}fighting=true;waveScheduled=false;document.getElementById('btn-fight').textContent='⏸ 暂停';document.getElementById('entry-mark').style.display='none';document.getElementById('exit-mark').style.display='none';if(!enemies.length&&wave<currentLevel.waves)spawnWave();loop();}else{fighting=false;waveScheduled=false;document.getElementById('btn-fight').textContent='⚔️ 开战';}}
function spawnWave(){wave++;const isBossWave=wave===currentLevel.waves&&currentLevel.boss;const chapterInfo=CHAPTERS[currentLevel.chapter]||CHAPTERS.tutorial;showWave(isBossWave?'👹 '+chapterInfo.name+'BOSS!':'🌊 第'+wave+'波 ['+chapterInfo.name+']',isBossWave?'#F44336':chapterInfo.color);if(isBossWave){const baseBossHp=2500,levelBonus=curLevelIdx*150,chapterBonus=Math.floor(curLevelIdx/5)*500;enemies.push(makeEnemy(baseBossHp+levelBonus+chapterBonus,'#AB47BC',1.2,300,{isBoss:true}));const summonCount=3+Math.floor(curLevelIdx/3);for(let i=0;i<summonCount;i++)setTimeout(()=>{if(fighting)enemies.push(createEnemyByType(i%2===0?'fast':'normal',wave));},500+i*400);}else{const baseCount=2+wave,cnt=Math.min(baseCount,18);const availEnemies=currentLevel.enemies||['normal'];const useAll=availEnemies.includes('all');const typeWeights=getEnemyWeights(wave,availEnemies,useAll);for(let i=0;i<cnt;i++)setTimeout(()=>{if(fighting)enemies.push(createEnemyByType(weightedRandom(typeWeights),wave));},i*(800-Math.min(wave*5,350)));}updateUI();updateAIInfo();}
function getEnemyWeights(wave,availEnemies,useAll){const weights={};weights.normal=useAll||availEnemies.includes('normal')?40:0;weights.fast=useAll||availEnemies.includes('fast')?25+Math.min(wave*2,15):0;weights.tank=useAll||availEnemies.includes('tank')?15+Math.min(wave*1.5,10):0;weights.scout=(useAll||availEnemies.includes('scout'))&&wave>=2?8+wave:0;weights.destroyer=(useAll||availEnemies.includes('destroyer'))&&wave>=3?7+wave*.8:0;weights.shifter=(useAll||availEnemies.includes('shifter'))&&wave>=4?5+wave*.6:0;return weights;}
function weightedRandom(weights){const total=Object.values(weights).reduce((a,b)=>a+b,0);let r=Math.random()*total;for(const [type,weight]of Object.entries(weights)){r-=weight;if(r<=0)return type;}return 'normal';}
function createEnemyByType(type,wave){const base=ENEMY_TYPES[type];const hp=getEnemyHP(base.hp,wave);const gold=getEnemyGold(base.gold,wave);return makeEnemy(hp,base.color,base.size,gold,{isScout:base.isScout,isDestroyer:base.isDestroyer,isShifter:base.isShifter,atkDmg:base.atkDmg||0,atkSpeed:base.atkSpeed||1500,element:base.element||'normal'},base.speed);}
function makeEnemy(hp,co,sz,g,opts={},spd=.35){const p=path?path:[[ENTRY.x,ENTRY.y]];const posX=ox+(p[0][0]+.5)*CS;const posY=oy+(p[0][1]+.5)*CS;return{x:posX,y:posY,hp,hpMax:hp,spd,co,sz,gold:g,sl:0,dt:0,dv:0,pi:0,atkDmg:opts.atkDmg||0,atkSpeed:opts.atkSpeed||1500,lastAtkTime:0,boss:opts.isBoss||false,isScout:opts.isScout||false,isDestroyer:opts.isDestroyer||false,isShifter:opts.isShifter||false,element:opts.element||'normal',shiftTimer:0,currentElement:opts.element||'normal',eye:Math.random()*Math.PI*2};}
function showWave(m,c){const e=document.getElementById('wave-msg');e.textContent=m;e.style.color=c;e.style.display='block';setTimeout(()=>e.style.display='none',900);}
function screenShake(intensity=5,duration=300){shakeIntensity=intensity;shakeDuration=duration;shakeStart=Date.now();}
function addAnimation(type,x,y){animations.list.push({type,x,y,life:type==='place'?20:15,maxLife:type==='place'?20:15,size:0});}
function updateAnimations(){for(let i=animations.list.length-1;i>=0;i--){const a=animations.list[i];a.life--;if(a.type==='shoot'||a.type==='place')a.size=(1-a.life/a.maxLife)*30;if(a.life<=0)animations.list.splice(i,1);}if(animations.list.length>50)animations.list=animations.list.slice(-30);}
function spawnP(x,y,c,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1.5+Math.random()*4;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,co:c,l:25,ml:25,sz:2+Math.random()*3});}if(parts.length>200)parts=parts.slice(-100);}
function spawnKillEffect(x,y,isBoss=false){spawnP(x,y,'#FFD700',isBoss?40:20);if(isBoss){spawnP(x,y,'#AB47BC',30);spawnP(x,y,'#E040FB',15);screenShake(10,500);}}
const PARTICLE_EFFECTS={archer:(x,y)=>{spawnP(x,y,'#4CAF50',3);spawnP(x,y,'#8BC34A',2);},cannon:(x,y)=>{spawnP(x,y,'#FF5722',5,{gravity:.3});spawnP(x,y,'#FF9800',4);spawnP(x,y,'#FFC107',3);spawnP(x,y,'#FFD700',2);},ice:(x,y)=>{spawnP(x,y,'#03A9F4',4);spawnP(x,y,'#4FC3F7',3);spawnP(x,y,'#B3E5FC',2);},poison:(x,y)=>{spawnP(x,y,'#8BC34A',4,{gravity:.05});spawnP(x,y,'#CDDC39',3);spawnP(x,y,'#F0F4C3',2);},thunder:(x,y)=>{spawnP(x,y,'#FFC107',5);spawnP(x,y,'#FFEB3B',4);spawnP(x,y,'#FFF8E1',3);},kill:(x,y,isBoss=false)=>spawnKillEffect(x,y,isBoss),leak:(x,y)=>{spawnP(x,y,'#FF1744',10,{gravity:.1});spawnP(x,y,'#FF5722',8);spawnP(x,y,'#D50000',5);},place:(x,y)=>{spawnP(x,y,'#00E5FF',8);spawnP(x,y,'#E1BEE7',5);spawnP(x,y,'#fff',3);},bossAppear:(x,y)=>{spawnP(x,y,'#E040FB',20);spawnP(x,y,'#AA00FF',15);spawnP(x,y,'#FFD700',25);screenShake(10,500);},weakness:(x,y)=>{const rainbow=['#FF5252','#FF9800','#FFEB3B','#4CAF50','#2196F3','#9C27B0'];rainbow.forEach(c=>spawnP(x,y,c,3));}};
function loop(){if(!fighting)return;for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];if(e.isShifter){e.shiftTimer++;if(e.shiftTimer>=300){e.shiftTimer=0;const elements=['fire','ice','poison','normal'];e.currentElement=elements[Math.floor(Math.random()*elements.length)];const colors={fire:'#FF5722',ice:'#03A9F4',poison:'#8BC34A',normal:'#9C27B0'};e.co=colors[e.currentElement];}}let sp=e.spd;if(e.sl>0)sp*=.4;if(e.dt>0){e.hp-=e.dv;e.dt--;}e.pi+=sp/60;const p=e.pathInfo?.path||path;if(!p||p.length===0)continue;const pathLen=p.length;const idx=Math.min(Math.floor(e.pi),pathLen-1);const t=Math.min(e.pi-Math.floor(e.pi),1);const currX=p[idx][0],currY=p[idx][1];const moveNextIdx=(idx<pathLen-1)?idx+1:idx;const nextX=p[moveNextIdx][0],nextY=p[moveNextIdx][1];e.x=ox+(currX+t*(nextX-currX)+.5)*CS;e.y=oy+(currY+t*(nextY-currY)+.5)*CS;if(p&&p.length>1&&e.pi>=p.length-1){if(e.isScout){aiMemory.scoutSurvived++;for(const t of towers)if(!t.isWall&&!aiMemory.dangerZones.find(z=>z.x===t.x&&z.y===t.y))aiMemory.dangerZones.push({x:t.x,y:t.y});}if(PARTICLE_EFFECTS.leak)PARTICLE_EFFECTS.leak(e.x,e.y);screenShake(8,300);hp--;enemies.splice(i,1);updateUI();if(hp<=0){gameOver();return;}continue;}if(e.hp<=0){gold+=e.gold;kills++;spawnKillEffect(e.x,e.y,e.boss);dmgTexts.push({x:e.x,y:e.y-20,txt:'+'+e.gold,co:'#FFD700',life:40});enemies.splice(i,1);updateUI();updateTool();continue;}const nextIdx=Math.floor(e.pi)+1;if(nextIdx<p.length){const nx=p[nextIdx][0],ny=p[nextIdx][1];if(grid[ny]&&grid[ny][nx]!==0){e.lastAtkTime=e.lastAtkTime||0;const now=Date.now();if(now-e.lastAtkTime>=e.atkSpeed){e.lastAtkTime=now;if(grid[ny][nx]===1){grid[ny][nx]=0;spawnP(ox+(nx+.5)*CS,oy+(ny+.5)*CS,'#78909C',10);showTip('💥 敌人摧毁了墙壁!');}else if(e.isDestroyer){let targetTower=null;for(const t of towers)if(t.x===nx&&t.y===ny){targetTower=t;break;}if(targetTower){grid[ny][nx]=0;towers.splice(towers.indexOf(targetTower),1);spawnP(ox+(nx+.5)*CS,oy+(ny+.5)*CS,targetTower.co,15);showTip('💥 破坏者摧毁了'+(N[targetTower.tp]||'塔')+'!');}}aiMemory.destroyerAttacks++;path=findPath();}continue;}}if(enemies.length===0){if(wave<currentLevel.waves&&!waveScheduled){waveScheduled=true;setTimeout(()=>{if(fighting)spawnWave();waveScheduled=false;},3000);}else if(wave>=currentLevel.waves){setTimeout(levelComplete,600);return;}}for(const t of towers){if(t.cd>0){t.cd--;continue;}if(t.d===0)continue;const tx=ox+(t.x+.5)*CS,ty=oy+(t.y+.5)*CS,rn=t.r*CS;let tg=null,md=Infinity;for(const e of enemies){const d=Math.hypot(e.x-tx,e.y-ty);if(d<rn&&d<md){md=d;tg=e;}}if(tg){t.cd=Math.floor(t.s/1000*FPS);const a=Math.atan2(tg.y-ty,tg.x-tx);let dmgMult=1;const towerElement=T[t.tp].element||'normal';const enemyElement=tg.isShifter?tg.currentElement:tg.element;const weakness=ELEMENT_BONUS[enemyElement]?.weakTo||[];if(weakness.includes(towerElement))dmgMult=1.5;else if(ELEMENT_BONUS[enemyElement]?.bonus&&towerElement===enemyElement)dmgMult=.7;bullets.push({x:tx,y:ty,vx:Math.cos(a)*12,vy:Math.sin(a)*12,d:t.d,co:t.co,src:t,dmgMult,element:towerElement});addAnimation('shoot',tx,ty);}}for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];b.x+=b.vx;b.y+=b.vy;if(b.x<0||b.x>W||b.y<0||b.y>H){bullets.splice(i,1);continue;}for(let j=enemies.length-1;j>=0;j--){const e=enemies[j];if(Math.hypot(e.x-b.x,e.y-b.y)<e.sz*CS*.5+5){const finalDmg=Math.floor(b.d*(b.dmgMult||1));e.hp-=finalDmg;const txtColor=(b.dmgMult||1)>1?'#FFD700':'#F44336';dmgTexts.push({x:e.x,y:e.y-30,txt:(b.dmgMult||1)>1?'💥':''+finalDmg,co:txtColor,life:30});if(b.src.tp==='ice')e.sl=T.ice.slowDur;if(b.src.tp==='poison'){e.poisonStacks=(e.poisonStacks||0)+1;e.poisonStacks=Math.min(e.poisonStacks,T.poison.dotStacks);e.dt=T.poison.dotDur;e.dv=T.poison.dot*e.poisonStacks;}if(b.src.a){const aoeTargets=enemies.filter(o=>o!==e&&Math.hypot(o.x-b.x,o.y-b.y)<b.src.a*CS);for(const o of aoeTargets)o.hp-=b.d*.5*(b.dmgMult||1);}if(b.src.chain){let chainCount=b.src.chain,chainMult=.8,chained=[e],curX=b.x,curY=b.y;while(chainCount>0){let nearest=null,nearestDist=Infinity;for(con lorStop(1,'#4A148C');ctx.fillStyle=robeG;ctx.beginPath();ctx.moveTo(-r*.5,r*.35);ctx.lineTo(-r*.45,-r*.15);ctx.quadraticCurveTo(-r*.4,-r*.35,0,-r*.35);ctx.quadraticCurveTo(r*.4,-r*.35,r*.45,-r*.15);ctx.lineTo(r*.5,r*.35);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(255,255,255,.1)';ctx.beginPath();ctx.moveTo(-r*.35,r*.35);ctx.lineTo(-r*.3,-r*.1);ctx.quadraticCurveTo(-r*.25,-r*.28,-r*.05,-r*.3);ctx.lineTo(-r*.05,r*.35);ctx.closePath();ctx.fill();const faceG=ctx.createRadialGradient(-r*.08,-r*.55,0,0,-r*.5,r*.28);faceG.addColorStop(0,'#FFCC80');faceG.addColorStop(1,'#BF360C');ctx.fillStyle=faceG;ctx.beginPath();ctx.arc(0,-r*.5,r*.26,0,Math.PI*2);ctx.fill();ctx.fillStyle='#4A148C';ctx.beginPath();ctx.moveTo(-r*.32,-r*.42);ctx.lineTo(0,-r*1);ctx.lineTo(r*.32,-r*.42);ctx.closePath();ctx.fill();ctx.fillStyle='#6A1B9A';ctx.beginPath();ctx.ellipse(0,-r*.42,r*.36,r*.1,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FFD54F';ctx.beginPath();const starX=0,starY=-r*.72;for(let i=0;i<5;i++){const angle=(i*4*Math.PI/5)-Math.PI/2;const x=starX+Math.cos(angle)*r*.1;const y=starY+Math.sin(angle)*r*.1;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.closePath();ctx.fill();ctx.strokeStyle='#FFD54F';ctx.lineWidth=r*.1;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(r*.3,-r*.2);ctx.lineTo(r*.45,r*.3);ctx.stroke();ctx.strokeStyle='#FFEE58';ctx.lineWidth=r*.08;ctx.beginPath();ctx.moveTo(r*.22,-r*.35);ctx.lineTo(r*.35,-r*.15);ctx.lineTo(r*.22,-r*.15);ctx.lineTo(r*.35,r*.05);ctx.stroke();const orbG=ctx.createRadialGradient(r*.28,-r*.28,0,r*.28,-r*.28,r*.18);orbG.addColorStop(0,'#FFEE58');orbG.addColorStop(.5,'#FFC107');orbG.addColorStop(1,'rgba(255,193,7,0)');ctx.fillStyle=orbG;ctx.beginPath();ctx.arc(r*.28,-r*.28,r*.18,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(-r*.1,-r*.52,r*.1,r*.13,0,0,Math.PI*2);ctx.ellipse(r*.1,-r*.52,r*.1,r*.13,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#4A148C';ctx.beginPath();ctx.arc(-r*.08,-r*.5,r*.065,0,Math.PI*2);ctx.arc(r*.12,-r*.5,r*.065,0,Math.PI*2);ctx.fill();break;}case'wall':{const wallG=ctx.createLinearGradient(0,-r*.8,0,r*.8);wallG.addColorStop(0,'#78909C');wallG.addColorStop(.5,'#546E7A');wallG.addColorStop(1,'#37474F');ctx.fillStyle=wallG;ctx.beginPath();ctx.roundRect(-r*.75,-r*.75,r*1.5,r*1.5,r*.2);ctx.fill();ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(-r*.75,-r*.05,r*1.5,r*.1);ctx.fillRect(-r*.05,-r*.75,r*.1,r*.8);ctx.fillRect(-r*.55,r*.05,r*.1,r*.7);ctx.fillRect(r*.35,r*.05,r*.1,r*.7);ctx.fillStyle='rgba(255,255,255,.12)';ctx.beginPath();ctx.roundRect(-r*.72,-r*.72,r*1.44,r*.35,r*.15);ctx.fill();break;}}ctx.restore();}
function startGame(){const saved=loadProgress();curLevelIdx=saved?saved.curLevelIdx:0;currentLevel=LEVELS[curLevelIdx];gold=currentLevel.startGold;hp=20;wave=0;kills=0;fighting=false;tutorialStep=0;tutorialShown=false;document.getElementById('menu').style.display='none';document.getElementById('game').style.display='flex';document.getElementById('over').style.display='none';document.getElementById('level-complete').style.display='none';if(!inited)initCanvas();initGrid();updateUI();updateAIInfo();render();setTimeout(showTutorial,500);}
function gameOver(){fighting=false;document.getElementById('final-wave').textContent=wave;document.getElementById('final-kills').textContent=kills;document.getElementById('over').style.display='flex';}
function levelComplete(){fighting=false;const stars=hp>=18?3:hp>=12?2:1;const bonus=currentLevel.goldBonus;saveScore(currentLevel.id,stars);saveProgress();document.getElementById('stars').textContent='⭐'.repeat(stars);document.getElementById('bonus-gold').textContent=bonus;document.getElementById('level-complete').style.display='flex';}
function nextLevel(){curLevelIdx++;if(curLevelIdx>=LEVELS.length)curLevelIdx=0;currentLevel=LEVELS[curLevelIdx];gold=currentLevel.startGold;hp=20;wave=0;kills=0;fighting=false;tutorialStep=0;tutorialShown=false;document.getElementById('level-complete').style.display='none';initGrid();updateUI();updateAIInfo();render();saveProgress();setTimeout(showTutorial,500);}
function initTowerIcons(){document.querySelectorAll('.icon-cv').forEach(canvas=>{const type=canvas.dataset.tower;const ctx=canvas.getContext('2d');ctx.clearRect(0,0,24,24);drawTowerIcon(ctx,type,12,12,10);});}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',()=>setTimeout(initTowerIcons,100));}else{setTimeout(initTowerIcons,100);}
let selectedTowerForUpgrade=null;
function showUpgradePanel(tower){selectedTowerForUpgrade=tower;const panel=document.getElementById('upgrade-panel');const info=document.getElementById('up-info');const btn=document.getElementById('up-btn');if(!panel||!tower)return;const cost=getUpgradeCost(tower);const rect=cv.getBoundingClientRect();const cx=rect.left+(tower.x+.5)*CS*(rect.width/W);const cy=rect.top+(tower.y+.5)*CS*(rect.height/H);panel.style.left=(cx-80)+'px';panel.style.top=(cy-100)+'px';if(tower.lv>=3){info.innerHTML='⭐ '+N[tower.tp]+' Lv.'+tower.lv+'<br><span style="color:#FFD700">已达满级</span>';btn.disabled=true;btn.textContent='满级';}else{const extraDmg=Math.floor(T[tower.tp].d*.4);const extraRng=(T[tower.tp].r*.15).toFixed(1);info.innerHTML=N[tower.tp]+' Lv.'+tower.lv+' → <b style="color:#FFD700">Lv.'+(tower.lv+1)+'</b><br>⚔️ '+tower.d+' → '+(tower.d+extraDmg)+' 伤害<br>⚡ '+tower.r+' → '+(tower.r+parseFloat(extraRng))+' 范围';btn.disabled=false;btn.textContent='升级 ('+cost+' 金)';}panel.style.display='block';}
function closeUpgradePanel(){document.getElementById('upgrade-panel').style.display='none';selectedTowerForUpgrade=null;}
function doUpgradeFromPanel(){if(!selectedTowerForUpgrade)return;const{x,y}=selectedTowerForUpgrade;closeUpgradePanel();upgradeTower(x,y);}
function upgradeTower(x,y){const t=towers.find(t=>t.x===x&&t.y===y);if(!t||t.tp==='wall'){showTip('⚠️ 该类型无法升级');return;}if(t.lv>=3){showTip('⭐ 已达满级 (Lv.3)');return;}const baseCost=T[t.tp].$;const cost=Math.floor(baseCost*(t.lv+1)*.6);if(gold<cost){showTip('⚠️ 金币不足! 需要 '+cost);return;}gold-=cost;t.lv=(t.lv||1)+1;t.d=Math.floor(T[t.tp].d*(1+(t.lv-1)*.4));t.r=parseFloat((T[t.tp].r*(1+(t.lv-1)*.15)).toFixed(1));t.s=Math.floor(T[t.tp].s*(1-(t.lv-1)*.2));spawnP(ox+(x+.5)*CS,oy+(y+.5)*CS,'#FFD700',20);showTip('⬆ Lv.'+t.lv+' '+N[t.tp]+' 升级成功!');saveProgress();updateUI();}
function getUpgradeCost(tower){if(!tower||tower.lv>=3)return null;return Math.floor(T[tower.tp].$*(tower.lv+1)*.6);}
document.addEventListener('click',function(e){const panel=document.getElementById('upgrade-panel');if(panel&&panel.style.display==='block'&&!panel.contains(e.target)&&e.target.id!=='up-btn')closeUpgradePanel();});
</script>
